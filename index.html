<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>あおやぎファーム 日報入力</title>
<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
  :root {
    --green:#2d6a2d; --green-mid:#4a9e4a; --green-light:#e8f5e9; --green-pale:#f1f8f1;
    --accent:#ff6b35; --amber:#f59e0b; --red:#ef4444;
    --text:#1a1a1a; --muted:#6b7280; --border:#d1d5db; --radius:12px;
    --shadow:0 2px 12px rgba(0,0,0,0.08);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans JP',sans-serif;background:#f5f7f5;color:var(--text);min-height:100vh;padding-bottom:20px;}
  .header{background:var(--green);color:white;padding:14px 16px 12px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2);}
  .header-icon{font-size:22px;} .header-title{font-size:16px;font-weight:700;}
  .header-user{font-size:12px;opacity:.85;background:rgba(255,255,255,.15);padding:3px 8px;border-radius:20px;margin-left:4px;}
  .header-date{margin-left:auto;font-size:12px;opacity:.85;background:rgba(255,255,255,.15);padding:3px 8px;border-radius:20px;}
  .tabs{display:flex;background:white;border-bottom:2px solid var(--border);position:sticky;top:52px;z-index:99;overflow-x:auto;}
  .tab{flex:1;min-width:60px;padding:10px 4px;text-align:center;font-size:11px;font-weight:500;color:var(--muted);border-bottom:3px solid transparent;cursor:pointer;transition:all .2s;white-space:nowrap;}
  .tab.active{color:var(--green);border-bottom-color:var(--green);font-weight:700;}
  .content{padding:12px;}
  .section{background:white;border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow);}
  .section-title{font-size:13px;font-weight:700;color:var(--green);margin-bottom:12px;display:flex;align-items:center;gap:6px;}
  .section-title::after{content:'';flex:1;height:1px;background:var(--green-light);}
  .form-row{display:flex;gap:10px;margin-bottom:10px;}
  .form-row.col2>*{flex:1;} .form-row.col3>*{flex:1;}
  .form-group{display:flex;flex-direction:column;gap:4px;}
  .form-group label{font-size:11px;font-weight:700;color:var(--muted);}
  .form-group input[type="date"],.form-group textarea{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;}
  .form-group input[type="number"]{width:100%;padding:12px;border:1.5px solid var(--border);border-radius:8px;font-size:16px;font-weight:700;font-family:inherit;text-align:right;}
  .form-group input[type="text"]{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;}
  .select-wrap{position:relative;}
  .select-wrap::after{content:'▾';position:absolute;right:10px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--muted);font-size:12px;}
  .select-wrap select{width:100%;padding:10px 28px 10px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;appearance:none;background:white;}
  .stepper{display:flex;align-items:center;border:1.5px solid var(--border);border-radius:8px;overflow:hidden;}
  .stepper button{width:40px;height:42px;border:none;background:var(--green-light);font-size:18px;cursor:pointer;color:var(--green);font-weight:700;flex-shrink:0;}
  .stepper span{flex:1;text-align:center;font-size:18px;font-weight:700;}
  .feel-btns{display:flex;gap:6px;}
  .feel-btn{flex:1;padding:8px 4px;border:1.5px solid var(--border);border-radius:8px;font-size:11px;text-align:center;cursor:pointer;background:white;font-family:inherit;line-height:1.3;}
  .feel-btn.active{background:var(--green-light);border-color:var(--green);font-weight:700;}
  .entry-card{background:var(--green-pale);border-radius:10px;padding:12px;margin-bottom:10px;position:relative;border:1.5px solid var(--green-light);}
  .entry-num{position:absolute;top:8px;left:10px;font-size:11px;font-weight:700;color:var(--green);}
  .entry-del{position:absolute;top:8px;right:10px;background:none;border:none;color:#999;font-size:18px;cursor:pointer;padding:0;line-height:1;}
  .add-btn{width:100%;padding:10px;border:2px dashed var(--green-mid);border-radius:8px;background:var(--green-pale);color:var(--green);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
  .total-bar{background:var(--green-light);border-radius:8px;padding:8px 12px;font-size:12px;font-weight:700;color:var(--green);margin-top:8px;}
  .alert-btns{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:0;}
  .alert-btn{padding:7px 11px;border:1.5px solid var(--border);border-radius:20px;font-size:12px;background:white;cursor:pointer;font-family:inherit;transition:all .15s;color:var(--text);}
  .alert-btn.active{background:#fef2f2;border-color:var(--red);color:var(--red);font-weight:700;}
  .alert-input{width:100%;padding:10px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;resize:none;}
  .submit-btn{width:100%;padding:16px;background:var(--green);color:white;border:none;border-radius:var(--radius);font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:12px;}
  .submit-btn:active{background:#1e4d1e;}
  .submit-btn.sale-btn{background:#e07b3a;}
  .submit-btn.sale-btn:active{background:#b85e24;}
  .submit-btn.pest-btn{background:#388e3c;}
  .submit-btn.edit-btn{background:#5c6bc0;}
  .submit-btn.edit-btn:active{background:#3949ab;}
  .toast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-20px);background:var(--green);color:white;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:700;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;z-index:999;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .draft-bar{background:#fffbeb;border-bottom:2px solid var(--amber);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;font-size:13px;font-weight:700;color:#92400e;}
  .draft-actions{display:flex;gap:8px;}
  .draft-btn{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;border:none;cursor:pointer;font-family:inherit;}
  .draft-btn.restore{background:var(--amber);color:white;}
  .draft-btn.discard{background:#e5e7eb;color:#374151;}
  .info-box{background:var(--green-pale);border-radius:8px;padding:10px;margin-top:8px;font-size:12px;line-height:1.8;}
  .count-banner{padding:10px 12px;border-radius:8px;font-size:13px;font-weight:700;margin-top:10px;}
  .sale-row{display:flex;align-items:center;gap:6px;padding:8px 0;border-bottom:1px solid var(--green-light);}
  .sale-dest{width:80px;font-size:12px;font-weight:700;color:var(--green);flex-shrink:0;}
  .sale-calc{font-size:11px;color:var(--muted);margin-top:4px;text-align:right;}
  .sale-total-bar{background:#fff3e0;border-radius:8px;padding:8px 12px;font-size:12px;font-weight:700;color:#e65100;margin-top:8px;}
  /* 修正タブ */
  .edit-card{background:#f3f4f6;border-radius:10px;padding:14px;margin-bottom:10px;border:1.5px solid #d1d5db;}
  .edit-field{margin-bottom:8px;}
  .edit-field label{font-size:11px;font-weight:700;color:var(--muted);display:block;margin-bottom:3px;}
  .hidden{display:none!important;}
</style>
</head>
<body>

<!-- ヘッダー -->
<div class="header">
  <span class="header-icon">🌿</span>
  <span class="header-title">あおやぎファーム</span>
  <span class="header-user" id="userName"></span>
  <span class="header-date" id="headerDate"></span>
</div>

<!-- タブ (5タブ) -->
<div class="tabs">
  <div class="tab active" onclick="switchTab('work')">👷 作業</div>
  <div class="tab" onclick="switchTab('sale')">🚚 出荷</div>
  <div class="tab" onclick="switchTab('pest')">🌿 防除</div>
  <div class="tab" onclick="switchTab('edit')">✏️ 修正</div>
</div>

<!-- 一時保存バー -->
<div id="draftBar" class="draft-bar hidden">
  <span id="draftMsg">📝 下書きあり</span>
  <div class="draft-actions">
    <button onclick="loadDraft()" class="draft-btn restore">復元する</button>
    <button onclick="clearDraft()" class="draft-btn discard">破棄</button>
  </div>
</div>

<!-- トースト -->
<div class="toast" id="toast"></div>

<!-- ===== 作業ログタブ ===== -->
<div id="tabWork" class="content">
  <div class="section">
    <div class="section-title">📅 基本情報</div>
    <div class="form-row">
      <div class="form-group"><label>日付</label><input type="date" id="workDate"></div>
    </div>
    <div class="form-row col3">
      <div class="form-group">
        <label>気温(℃)</label>
        <div class="stepper">
          <button onclick="step('temp',-1)">−</button>
          <span id="tempVal">15</span>
          <button onclick="step('temp',1)">＋</button>
        </div>
      </div>
      <div class="form-group">
        <label>風速(m)</label>
        <div class="stepper">
          <button onclick="step('wind',-1)">−</button>
          <span id="windVal">3</span>
          <button onclick="step('wind',1)">＋</button>
        </div>
      </div>
      <div class="form-group">
        <label>天気</label>
        <div class="select-wrap">
          <select id="weather">
            <option>晴れ</option><option>晴れ時々曇り</option><option>晴れ時々雨</option>
            <option>曇り</option><option>曇り時々晴れ</option><option>曇り時々雨</option>
            <option>雨</option><option>雨のち晴れ</option><option>強風</option>
          </select>
        </div>
      </div>
    </div>
    <div class="form-group" style="margin-bottom:10px">
      <label>体感</label>
      <div class="feel-btns">
        <button class="feel-btn" onclick="setFeel(this,'非常に寒い')">🥶<br>非常に寒い</button>
        <button class="feel-btn" onclick="setFeel(this,'寒い')">❄️<br>寒い</button>
        <button class="feel-btn active" onclick="setFeel(this,'普通')">😊<br>普通</button>
        <button class="feel-btn" onclick="setFeel(this,'暑い')">☀️<br>暑い</button>
        <button class="feel-btn" onclick="setFeel(this,'非常に暑い')">🔥<br>非常に暑い</button>
      </div>
    </div>
    <div class="form-group">
      <label>異常連絡</label>
      <div class="alert-btns">
        <button class="alert-btn" onclick="toggleAlert(this,'怪我')">🤕 怪我</button>
        <button class="alert-btn" onclick="toggleAlert(this,'体調不良')">🤒 体調不良</button>
        <button class="alert-btn" onclick="toggleAlert(this,'設備不具合')">🔧 設備不具合</button>
        <button class="alert-btn" onclick="toggleAlert(this,'天候被害')">🌪 天候被害</button>
        <button class="alert-btn" onclick="toggleAlert(this,'資材不足')">📦 資材不足</button>
        <button class="alert-btn" onclick="toggleAlert(this,'病害虫')">🐛 病害虫</button>
      </div>
      <textarea class="alert-input" id="alertText" rows="2" placeholder="詳細メモ（任意）" style="margin-top:8px"></textarea>
    </div>
  </div>
  <div class="section">
    <div class="section-title">🔨 作業内容</div>
    <div id="entryList"></div>
    <button class="add-btn" onclick="addEntry()">＋ 作業行を追加</button>
    <div class="total-bar" id="totalBar">⏱ 合計: —</div>
  </div>
  <button class="submit-btn" onclick="submitWork()">
    <span>💾</span><span>作業ログを登録する</span>
  </button>
</div>

<!-- ===== 出荷タブ ===== -->
<div id="tabSale" class="content hidden">
  <div class="section">
    <div class="section-title">📅 出荷日・単価</div>
    <div class="form-row col2">
      <div class="form-group"><label>出荷日</label><input type="date" id="saleDate"></div>
      <div class="form-group">
        <label>100gあたり単価(円)</label>
        <input type="number" id="saleUnitPrice" min="0" step="1" inputmode="numeric" placeholder="例: 50" oninput="recalcSale()">
      </div>
    </div>
  </div>
  <div class="section">
    <div class="section-title">📦 出荷内容</div>
    <p style="font-size:11px;color:var(--muted);margin-bottom:10px">各出荷先の数量・単位・内容量を入力してください</p>
    <div id="saleList"></div>
    <div class="sale-total-bar" id="saleTotalBar">合計: —</div>
  </div>
  <div class="section">
    <div class="section-title">📝 備考</div>
    <div class="form-group">
      <textarea class="alert-input" id="saleMemo" rows="2" placeholder="例: 予備2袋含む"></textarea>
    </div>
  </div>
  <button class="submit-btn sale-btn" onclick="submitSale()">
    <span>🚚</span><span>出荷データを登録する</span>
  </button>
</div>

<!-- ===== 防除タブ ===== -->
<div id="tabPest" class="content hidden">
  <div class="section">
    <div class="section-title">📅 散布情報</div>
    <div class="form-row col2">
      <div class="form-group"><label>散布日</label><input type="date" id="pestDate"></div>
      <div class="form-group">
        <label>担当者</label>
        <div class="select-wrap"><select id="pestWorker"></select></div>
      </div>
    </div>
    <div class="form-row col2">
      <div class="form-group">
        <label>天候</label>
        <div class="select-wrap">
          <select id="pestWeather">
            <option>晴</option><option>曇</option><option>晴のち曇</option><option>曇のち晴</option><option>小雨</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>気温(℃)</label>
        <div class="stepper">
          <button onclick="stepPest('temp',-1)">−</button>
          <span id="pestTempVal">20</span>
          <button onclick="stepPest('temp',1)">＋</button>
        </div>
      </div>
    </div>
  </div>
  <div class="section">
    <div class="section-title">💊 農薬選択</div>
    <div id="pestMasterLoading" style="color:var(--muted);font-size:13px;padding:8px 0">読み込み中...</div>
    <div id="pestSelectWrap" class="hidden">
      <div class="form-group">
        <label>薬品</label>
        <div class="select-wrap"><select id="pestCd" onchange="onPestSelect()"></select></div>
      </div>
      <div id="pestInfo" class="info-box" style="display:none"><span id="pestInfoText"></span></div>
    </div>
    <div id="pestCountBanner" class="count-banner" style="display:none"></div>
  </div>
  <div class="section">
    <div class="section-title">🗺 圃場別 散布量入力</div>
    <p style="font-size:11px;color:var(--muted);margin-bottom:10px">散布した圃場の量(L)を入力してください。面積は自動表示。</p>
    <div id="pestFieldList"></div>
    <div style="background:#e8f5e9;border-radius:8px;padding:10px 12px;margin-top:8px;font-size:13px;font-weight:700;color:#2e7d32" id="pestTotalBar">
      合計: 散布量 — L　/　面積 — a
    </div>
  </div>
  <div class="section">
    <div class="section-title">📝 備考</div>
    <div class="form-group">
      <textarea class="alert-input" id="pestMemo" rows="2" placeholder="薬害・病害虫の状況など"></textarea>
    </div>
  </div>
  <button class="submit-btn pest-btn" onclick="submitPest()">
    <span>🌿</span><span>防除実績を登録する</span>
  </button>
</div>

<!-- ===== 修正タブ ===== -->
<div id="tabEdit" class="content hidden">
  <div class="section">
    <div class="section-title">✏️ 修正内容を入力</div>
    <div class="form-row col2">
      <div class="form-group">
        <label>日付</label>
        <input type="date" id="editDate">
      </div>
      <div class="form-group">
        <label>ログ種類</label>
        <div class="select-wrap">
          <select id="editType" onchange="onEditTypeChange()">
            <option value="work">👷 作業ログ</option>
            <option value="sale">🚚 出荷ログ</option>
            <option value="pest">🌿 防除ログ</option>
          </select>
        </div>
      </div>
    </div>
    <p style="font-size:11px;color:var(--muted);margin-top:4px">
      💡 日付とログ種類を選んでフォームに修正内容を入力し、送信してください
    </p>
  </div>

  <div id="editArea">
    <!-- 作業ログ修正 -->
    <div id="editWork">
      <div class="section">
        <div class="section-title">👷 作業ログ修正</div>
        <div id="editWorkFields"></div>
      </div>
    </div>
    <!-- 出荷ログ修正 -->
    <div id="editSale" class="hidden">
      <div class="section">
        <div class="section-title">🚚 出荷ログ修正</div>
        <div id="editSaleFields"></div>
      </div>
    </div>
    <!-- 防除ログ修正 -->
    <div id="editPest" class="hidden">
      <div class="section">
        <div class="section-title">🌿 防除ログ修正</div>
        <div id="editPestFields"></div>
      </div>
    </div>
    <button class="submit-btn edit-btn" onclick="submitEdit()">
      <span>✏️</span><span>修正内容を登録する</span>
    </button>
  </div>
</div>

<script>
// ============================================================
// データ定義
// ============================================================
let WORKERS = ['青柳匡彦','青柳絵瑠','藤井基貴','麻友子','良枝','賢一','孝雄','達也','恒川','渡辺ゆき乃','桜庭裕紀子','花島夢美','松本美帆','小澤'];
const FIELDS = ['太田1','太田2','太田3','太田4','太田5','太田6','太田ハウス','岩名1','岩名2','岩名3','岩名4','（なし）'];
let CROPS = ['ケール','もものすけ','さつまいも','トレビス','その他'];

const WORK_GROUPS = [
  { label: '🌾 収穫・出荷準備', items: ['収穫（開始期）','収穫（本格）','収穫（拾い獲り）','選別調整','計量','袋詰め','ラベル貼付','箱詰め','出荷準備'] },
  { label: '🌱 育苗', items: ['育苗管理','育苗追肥','鉢上げ','播種'] },
  { label: '🚜 定植・圃場整備', items: ['定植','定植後灌水','不織布がけ','マルチ','防草シート','耕耘','圃場整備'] },
  { label: '🌿 施肥・防除', items: ['肥料（堆肥）','肥料（苦土石灰）','肥料（化成肥料）','肥料（液肥）','追肥（1回目）','追肥（2回目）','追肥（3回目）','追肥（4回目）','農薬散布','作業準備'] },
  { label: '✂️ 管理作業', items: ['除草','病害虫確認','灌水'] },
  { label: '📦 片付け', items: ['片付け（残渣抜き）','片付け（マルチはがし）','片付け（資材撤去）','片付け（清掃）'] },
  { label: '🚗 移動・事務', items: ['移動','出荷運搬','来客対応','ミーティング','計画・分析','写真撮影','日報'] },
  { label: '📝 その他', items: ['その他農作業','その他出荷','その他'] },
];
const WORKS = WORK_GROUPS.flatMap(g => g.items);
const UNITS = ['袋','ケース','個','kg'];
let SALE_ROWS = ['ランドローム','ベイシア佐倉店','さくらノーム','シェアガーデン','農総研','その他'];

const PESTICIDE_FALLBACK = [
  { cd:'P001', name:'Zボルドー',                kubun:'殺菌', irac:'',    target:'炭疽細菌病他',                        dilution:'500倍',        timing:'',        limit:1,   ingredient:'' },
  { cd:'P002', name:'ダントツ水溶剤',           kubun:'殺虫', irac:'4A',  target:'アブラムシ類',                        dilution:'2000〜4000倍', timing:'収穫7日前',limit:3,   ingredient:'クロチアニジン' },

  { cd:'P004', name:'ディアナSC',               kubun:'殺虫', irac:'5',   target:'コナガ、アザミウマ類、ハスモンヨトウ', dilution:'2500〜5000倍', timing:'収穫前日', limit:2,   ingredient:'スピネトラム' },

async function init() {
  try {
    await liff.init({ liffId: '2009498715-Ti30qYpZ' });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    const profile = await liff.getProfile();
    document.getElementById('userName').textContent = profile.displayName;
    currentUserId = profile.userId;
  } catch(e) {
    console.warn('LIFF init failed:', e);
    document.getElementById('userName').textContent = 'ゲスト';
  }

  const today = new Date();
  const fmt = d => d.toISOString().slice(0,10);
  ['workDate','saleDate','pestDate','editDate'].forEach(id => {
    document.getElementById(id).value = fmt(today);
  });
  document.getElementById('headerDate').textContent =
    `${today.getMonth()+1}/${today.getDate()}(${['日','月','火','水','木','金','土'][today.getDay()]})`;

  addEntry();

  renderSales();

}

// ============================================================
// タブ切替
// ============================================================
function switchTab(tab) {
  currentTab = tab;
  ['work','sale','pest','edit'].forEach((t,i) => {
    document.querySelectorAll('.tab')[i].classList.toggle('active', t === tab);
    document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1)).classList.toggle('hidden', t !== tab);
  });
  // 修正タブに切り替えたら即フォーム表示
  if (tab === 'edit') onEditTypeChange();
}

// ============================================================
// ステッパー
// ============================================================
function step(id, delta) {
  if (id === 'temp') { tempVal = Math.max(-20, Math.min(45, tempVal + delta)); document.getElementById('tempVal').textContent = tempVal; }
  else { windVal = Math.max(0, Math.min(30, windVal + delta)); document.getElementById('windVal').textContent = windVal; }
}
function stepPest(id, delta) {
  pestTempVal = Math.max(-20, Math.min(45, pestTempVal + delta));
  document.getElementById('pestTempVal').textContent = pestTempVal;
}
function setFeel(btn, val) {
  feeling = val;
  document.querySelectorAll('.feel-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// 作業エントリー
// ============================================================
function sel(opts, cls, def) {
  return `<div class="select-wrap"><select class="${cls}">${opts.map((o,i)=>`<option${i===def?' selected':''}>${o}</option>`).join('')}</select></div>`;
}
function selWork(cls, defVal) {
  const opts = WORK_GROUPS.map(g =>
    `<optgroup label="${g.label}">${g.items.map(item =>
      `<option${item===defVal?' selected':''}>${item}</option>`
    ).join('')}</optgroup>`
  ).join('');
  return `<div class="select-wrap"><select class="${cls}">${opts}</select></div>`;
}
function addEntry() {
  const last = entries[entries.length-1] || {};
  entries.push({ w: last.w||0, f: last.f||0, c: last.c||0, k: last.k||WORK_GROUPS[0].items[0], h: 2.0 });
  renderEntries();
}
function removeEntry(i) {
  if (entries.length <= 1) return;
  entries.splice(i,1);
  renderEntries();
}
function renderEntries() {
  const el = document.getElementById('entryList');
  el.innerHTML = entries.map((e,i) => `
    <div class="entry-card">
      <span class="entry-num">${i+1}</span>
      ${i>0 ? `<button class="entry-del" onclick="removeEntry(${i})">×</button>` : ''}
      <div class="form-row col2" style="margin-top:8px">
        <div class="form-group"><label>作業者</label>${sel(WORKERS,'e-w',e.w)}</div>
        <div class="form-group"><label>区画</label>${sel(FIELDS,'e-f',e.f)}</div>
      </div>
      <div class="form-row col3">
        <div class="form-group"><label>作物</label>${sel(CROPS,'e-c',e.c)}</div>
        <div class="form-group"><label>作業</label>${selWork('e-k', e.k)}</div>
        <div class="form-group">
          <label>時間</label>
          <div class="stepper">
            <button onclick="stepH(${i},-0.25)">−</button>
            <span id="h${i}">${e.h.toFixed(2)}</span>
            <button onclick="stepH(${i},0.25)">＋</button>
          </div>
        </div>
      </div>
    </div>`).join('');
  document.querySelectorAll('.entry-card').forEach((card,i) => {
    card.querySelector('.e-w').addEventListener('change', e => { entries[i].w = e.target.selectedIndex; });
    card.querySelector('.e-f').addEventListener('change', e => { entries[i].f = e.target.selectedIndex; });
    card.querySelector('.e-c').addEventListener('change', e => { entries[i].c = e.target.selectedIndex; });
    card.querySelector('.e-k').addEventListener('change', e => {
      entries[i].k = e.target.value;
      // 農薬散布を選択したら防除タブへ誘導
      if (e.target.value === '農薬散布') {
        showToast('🌿 防除タブで詳細を入力してください');
        setTimeout(() => switchTab('pest'), 1000);
      }
    });
  });
  updateTotal();
}
function stepH(i, delta) {
  entries[i].h = Math.max(0.25, Math.min(24, entries[i].h + delta));
  document.getElementById(`h${i}`).textContent = entries[i].h.toFixed(2);
  updateTotal();
}
function updateTotal() {
  const totals = {};
  entries.forEach(e => {
    const name = WORKERS[e.w];
    totals[name] = (totals[name]||0) + e.h;
  });
  const txt = Object.entries(totals).map(([n,h])=>`${n}: ${h}h`).join('　');
  document.getElementById('totalBar').textContent = '⏱ 合計: ' + txt;
}

// sales配列: [{ qty:0, unit:'袋', gram:100 }, ...]
function recalcSale() {
  const unitPrice = parseFloat(document.getElementById('saleUnitPrice').value) || 0;
  let totalKg = 0, totalAmt = 0;
  SALE_ROWS.forEach((_, i) => {
    const qtyEl  = document.getElementById(`q${i}`);
    const gramEl = document.getElementById(`gram${i}`);
    const qty    = parseInt(qtyEl ? qtyEl.value : 0) || 0;
    const gram   = parseInt(gramEl ? gramEl.value : 100) || 0;
    const kg     = qty * gram / 1000;
    totalKg  += kg;
    totalAmt += (unitPrice > 0 && gram > 0) ? qty * gram / 100 * unitPrice : 0;
    const calcEl = document.getElementById(`calc${i}`);
    if (calcEl) {
      calcEl.textContent = gram > 0
        ? `→ ${kg.toFixed(2)}kg${unitPrice > 0 ? ' / ¥' + Math.round(qty * gram / 100 * unitPrice).toLocaleString() : ''}`
        : '';
    }
    if (!sales[i]) sales[i] = { qty: 0, unit: '袋', gram: 100 };
    sales[i].qty  = qty;
    sales[i].gram = gram;
  });
  const bar = document.getElementById('saleTotalBar');
  bar.textContent = `合計: ${totalKg.toFixed(2)}kg` +
    (unitPrice > 0 ? ` / ¥${Math.round(totalAmt).toLocaleString()}` : '');
}

function _defaultGram(unit) {
  if (unit === '袋')    return 100;
  if (unit === 'ケース') return 5000;
  if (unit === 'kg')   return 1000;
  return 100;
}

function renderSales() {
  const el = document.getElementById('saleList');
  el.innerHTML = SALE_ROWS.map((dest, i) => {
    const s    = sales[i] || { qty: 0, unit: '袋', gram: 100 };
    const gram = s.gram || _defaultGram(s.unit || '袋');
    return `
    <div style="background:var(--green-pale);border-radius:10px;padding:12px;margin-bottom:10px;border:1.5px solid var(--green-light)">
      <div style="font-size:13px;font-weight:700;color:var(--green);margin-bottom:8px">${dest}</div>
      <div style="display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap">
        <div style="flex:2;min-width:80px">
          <div style="font-size:10px;color:var(--muted);margin-bottom:2px">数量</div>
          <input type="number" id="q${i}" value="${s.qty}"
            min="0" inputmode="numeric" pattern="[0-9]*"
            style="width:100%;padding:10px;border:1.5px solid var(--border);border-radius:8px;font-size:18px;font-weight:700;text-align:right;font-family:inherit"
            oninput="recalcSale()">
        </div>
        <div style="flex:1;min-width:60px">
          <div style="font-size:10px;color:var(--muted);margin-bottom:2px">単位</div>
          <div class="select-wrap">
            <select id="u${i}" style="padding:10px 24px 10px 8px;font-size:13px"
              onchange="document.getElementById('gram${i}').value=_defaultGram(this.value);recalcSale()">
              ${UNITS.map(u=>`<option${u===s.unit?' selected':''}>${u}</option>`).join('')}
            </select>
          </div>
        </div>
        <div style="flex:1;min-width:70px">
          <div style="font-size:10px;color:var(--muted);margin-bottom:2px">内容量(g)</div>
          <input type="number" id="gram${i}" value="${gram}"
            min="1" inputmode="numeric"
            style="width:100%;padding:10px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;text-align:right"
            oninput="recalcSale()">
        </div>
      </div>
      <div style="font-size:11px;color:var(--muted);margin-top:4px;text-align:right" id="calc${i}"></div>
    </div>`;
  }).join('');
  recalcSale();
}

let fieldMaster = [];

function renderPestFields() {
  const el = document.getElementById('pestFieldList');
  if (!fieldMaster.length) {
    el.innerHTML = '<p style="color:var(--muted);font-size:13px">圃場情報を読み込み中...</p>';
    return;
  }
  el.innerHTML = fieldMaster.map((f, i) => `
    <div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--green-light)">
      <div style="flex:0 0 90px">
        <div style="font-size:13px;font-weight:700;color:var(--green)">${f.name}</div>
        <div style="font-size:10px;color:var(--muted)">${f.area ? f.area+'a' : '面積未登録'}</div>
      </div>
      <input type="number" id="pv${i}" value=""
        min="0" step="1" inputmode="numeric" placeholder="—"
        style="flex:1;padding:10px;border:1.5px solid var(--border);border-radius:8px;font-size:16px;font-weight:700;text-align:right;font-family:inherit"
        oninput="recalcPestTotal()">
      <div style="font-size:12px;color:var(--muted);flex:0 0 20px">L</div>
    </div>`).join('');
  recalcPestTotal();
}

function recalcPestTotal() {
  let totalVol = 0, totalArea = 0;
  fieldMaster.forEach((f, i) => {
    const v = parseFloat(document.getElementById(`pv${i}`)?.value || 0) || 0;
    if (v > 0) { totalVol += v; totalArea += (f.area || 0); }
  });
  const bar = document.getElementById('pestTotalBar');
  if (bar) bar.textContent =
    `合計: 散布量 ${totalVol > 0 ? totalVol.toFixed(0) : '—'} L　/　面積 ${totalArea > 0 ? totalArea.toFixed(2) : '—'} a`;
}

function onPestSelect() {
  const cd   = document.getElementById('pestCd').value;
  const pest = pesticideMaster.find(p => p.cd === cd);
  if (!pest) return;
  document.getElementById('pestInfoText').innerHTML =
    `<b>${pest.name}</b>（IRAC: ${pest.irac||'—'}）<br>` +
    `対象: ${pest.target||'—'}<br>` +
    `希釈: ${pest.dilution||'—'}　使用時期: ${pest.timing||'—'}<br>` +
    `使用上限: <b>${pest.limit!==null ? pest.limit+'回' : '—'}</b>　成分: ${pest.ingredient||'—'}`;
  document.getElementById('pestInfo').style.display = 'block';
  updatePestCountBanner();
}

async function updatePestCountBanner() {
  const banner = document.getElementById('pestCountBanner');
  const cdEl   = document.getElementById('pestCd');
  const cd     = cdEl ? cdEl.value : '';
  if (!cd) { banner.style.display = 'none'; return; }
  const pest = pesticideMaster.find(p => p.cd === cd);
  if (pest && pest.limit) {
    banner.style.display = 'block';
    banner.style.background = '#e8f5e9'; banner.style.color = '#2e7d32';
    banner.textContent = `ℹ️ ${pest.name} — 使用上限: ${pest.limit}回`;
  }
  try {
    const data = await fetchGASGet({ action: 'getPesticideStatus' });
    if (!data) return;
    const found = (data.status||[]).find(s => s.薬品CD === cd);
    if (!found || found.使用上限回数 === null) { banner.style.display = 'none'; return; }
    const { 当年実施回数:done, 使用上限回数:limit, 残り:left, 超過:over, 上限到達:reached } = found;
    banner.style.display = 'block';
    if (over) {
      banner.style.background = '#ffebee'; banner.style.color = '#c62828';
      banner.textContent = `🔴 使用上限超過！ ${done}回 / 上限${limit}回 — 使用を中止してください`;
    } else if (reached) {
      banner.style.background = '#fff3e0'; banner.style.color = '#e65100';
      banner.textContent = `🟡 上限到達 ${done}回 / ${limit}回 — これ以上の使用は規定違反です`;
    } else {
      banner.style.background = '#e8f5e9'; banner.style.color = '#2e7d32';
      banner.textContent = `✅ 使用回数: ${done}回 / 上限${limit}回（残り${left}回）`;
    }
  } catch(e) {}
}

// マスタ読み込み
// ============================================================
async function loadMasters() {
  try {
    const data = await fetchGASGet({ action: 'getMasters' });
    _applyMasters(data);
  } catch(e) {
    console.warn('getMasters失敗、フォールバック使用:', e);
    _applyMasters({});
  }
}

function _applyMasters(data) {
  if (data.workers && data.workers.length > 0) {
    WORKERS.length = 0; data.workers.forEach(w => WORKERS.push(w.name)); renderEntries();
  }
  if (data.crops && data.crops.length > 0) {
    CROPS.length = 0; data.crops.forEach(c => CROPS.push(c.name)); renderEntries();
  }
  if (data.dests && data.dests.length > 0) {
    SALE_ROWS.length = 0;
    data.dests.forEach(d => SALE_ROWS.push(d.name));
    while (sales.length < SALE_ROWS.length) sales.push({ qty: 0, unit: '袋', gram: 100 });
    sales.length = SALE_ROWS.length;
    renderSales();
  }
  // 防除: 担当者
  const pWorkerEl = document.getElementById('pestWorker');
  const workerList = data.workers && data.workers.length > 0
    ? data.workers : WORKERS.map((name, i) => ({ id: String(i), name }));
  pWorkerEl.innerHTML = workerList.map(w => `<option value="${w.id}">${w.name}</option>`).join('');
  // 防除: 圃場マスタ
  if (data.fields && data.fields.length > 0) {
    fieldMaster = data.fields.map(f => ({
      cd:   f.cd   || f['区画CD'] || '',
      name: f.name || f['区画名'] || f.cd || '',
      area: parseFloat(f.area || f['面積(a)']) || 0,
    }));
  } else {
    fieldMaster = FIELDS.filter(f => f !== '（なし）').map(f => ({ cd: f, name: f, area: 0 }));
  }
  renderPestFields();
  // 農薬マスタ
  pesticideMaster = (data.pesticides && data.pesticides.length > 0) ? data.pesticides : PESTICIDE_FALLBACK;
  const sel = document.getElementById('pestCd');
  const grouped = {};
  pesticideMaster.forEach(p => { const g = p.kubun||'その他'; if (!grouped[g]) grouped[g]=[]; grouped[g].push(p); });
  sel.innerHTML = Object.entries(grouped).map(([g, ps]) =>
    `<optgroup label="${g}">${ps.map(p =>
      `<option value="${p.cd}">${p.name}（IRAC:${p.irac||'-'}）</option>`
    ).join('')}</optgroup>`
  ).join('');
  document.getElementById('pestMasterLoading').classList.add('hidden');
  document.getElementById('pestSelectWrap').classList.remove('hidden');
  onPestSelect();
}

const DRAFT_KEY_WORK = 'aoyagi_draft_work';
const DRAFT_KEY_SALE = 'aoyagi_draft_sale';
function saveDraft() {
  try {
    const workDraft = {
      date: document.getElementById('workDate').value,
      weather: document.getElementById('weather').value,
      temp: tempVal, wind: windVal, feeling,
      alerts: Array.from(alertSelected),
      alertText: document.getElementById('alertText').value,
      entries,
      savedAt: new Date().toLocaleTimeString('ja-JP', {hour:'2-digit',minute:'2-digit'}),
    };
    const saleDraft = {
      date: document.getElementById('saleDate').value,
      sales,
      memo: document.getElementById('saleMemo').value,
    };
    localStorage.setItem(DRAFT_KEY_WORK, JSON.stringify(workDraft));
    localStorage.setItem(DRAFT_KEY_SALE, JSON.stringify(saleDraft));
    showToast(`💾 ${workDraft.savedAt} に一時保存しました`);
  } catch(e) { showToast('❌ 保存に失敗しました'); }
}
function loadDraft() {
  try {
    if (currentTab === 'work') {
      const d = JSON.parse(localStorage.getItem(DRAFT_KEY_WORK)||'null');
      if (!d) return;
      document.getElementById('workDate').value = d.date||'';
      document.getElementById('weather').value  = d.weather||'晴れ';
      tempVal = d.temp??15; document.getElementById('tempVal').textContent = tempVal;
      windVal = d.wind??3;  document.getElementById('windVal').textContent = windVal;
      feeling = d.feeling||'普通';
      document.querySelectorAll('.feel-btn').forEach(b => b.classList.toggle('active', b.textContent.includes(feeling)));
      alertSelected.clear();
      (d.alerts||[]).forEach(v => alertSelected.add(v));
      document.querySelectorAll('.alert-btn').forEach(b => {
        b.classList.toggle('active', alertSelected.has(b.textContent.trim().replace(/^.*?\s/,'')));
      });
      document.getElementById('alertText').value = d.alertText||'';
      entries = d.entries||[];
      if (entries.length===0) addEntry(); else renderEntries();
    } else {
      const d = JSON.parse(localStorage.getItem(DRAFT_KEY_SALE)||'null');
      if (!d) return;
      document.getElementById('saleDate').value = d.date||'';
      sales = d.sales||SALE_ROWS.map(()=>({qty:0,u:0}));
      renderSales();
      document.getElementById('saleMemo').value = d.memo||'';
    }
    document.getElementById('draftBar').classList.add('hidden');
    showToast('✅ 下書きを復元しました');
  } catch(e) { showToast('❌ 復元に失敗しました'); }
}
function clearDraft() {
  localStorage.removeItem(DRAFT_KEY_WORK);
  localStorage.removeItem(DRAFT_KEY_SALE);
  document.getElementById('draftBar').classList.add('hidden');
  showToast('🗑 下書きを破棄しました');
}
function checkDraft() {
  const w = localStorage.getItem(DRAFT_KEY_WORK);
  if (!w) return;
  try {
    const d = JSON.parse(w);
    document.getElementById('draftMsg').textContent = `💾 下書きあり${d.savedAt?'（'+d.savedAt+' 保存）':''}`;
    document.getElementById('draftBar').classList.remove('hidden');
  } catch(e) {}
}

function renderEditForm(logType, log) {
  ['editWork','editSale','editPest'].forEach(id => document.getElementById(id).classList.add('hidden'));

  // ── 作業ログ修正 ─────────────────────────────────────────────
  if (logType === 'work') {
    document.getElementById('editWork').classList.remove('hidden');
    const header = log?.header || {};

// ── 作業ログ修正用エントリー ──────────────────────────────────
let editEntries = [];

function addEditEntry() {
  const last = editEntries[editEntries.length-1] || {};
  editEntries.push({ w: last.w||0, f: last.f||0, c: last.c||0, k: last.k||WORK_GROUPS[0].items[0], h: 2.0 });
  renderEditEntries();
}

function removeEditEntry(i) {
  if (editEntries.length <= 1) return;
  editEntries.splice(i, 1);
  renderEditEntries();
}

function renderEditEntries() {
  const el = document.getElementById('editEntryList');
  if (!el) return;
  el.innerHTML = editEntries.map((e, i) => `
    <div class="entry-card">
      <span class="entry-num">${i+1}</span>
      ${i>0 ? `<button class="entry-del" onclick="removeEditEntry(${i})">×</button>` : ''}
      <div class="form-row col2" style="margin-top:8px">
        <div class="form-group"><label>作業者</label>
          <div class="select-wrap"><select id="ee_w${i}">
            ${WORKERS.map((w,j)=>`<option${j===e.w?' selected':''}>${w}</option>`).join('')}
          </select></div>
        </div>
        <div class="form-group"><label>区画</label>
          <div class="select-wrap"><select id="ee_f${i}">
            ${FIELDS.map((f,j)=>`<option${j===e.f?' selected':''}>${f}</option>`).join('')}
          </select></div>
        </div>
      </div>
      <div class="form-row col3">
        <div class="form-group"><label>作物</label>
          <div class="select-wrap"><select id="ee_c${i}">
            ${CROPS.map((c,j)=>`<option${j===e.c?' selected':''}>${c}</option>`).join('')}
          </select></div>
        </div>
        <div class="form-group"><label>作業</label>
          ${selWork('ee_k'+i, e.k)}
        </div>
        <div class="form-group">
          <label>時間</label>
          <div class="stepper">
            <button onclick="stepEditH(${i},-0.25)">−</button>
            <span id="eh${i}">${e.h.toFixed(2)}</span>
            <button onclick="stepEditH(${i},0.25)">＋</button>
          </div>
        </div>
      </div>
    </div>`).join('');
  editEntries.forEach((_, i) => {
    document.getElementById(`ee_w${i}`)?.addEventListener('change', e => { editEntries[i].w = e.target.selectedIndex; });
    document.getElementById(`ee_f${i}`)?.addEventListener('change', e => { editEntries[i].f = e.target.selectedIndex; });
    document.getElementById(`ee_c${i}`)?.addEventListener('change', e => { editEntries[i].c = e.target.selectedIndex; });
    document.querySelector(`.ee_k${i}`)?.addEventListener('change', e => { editEntries[i].k = e.target.value; });
  });
}

function stepEditH(i, delta) {
  editEntries[i].h = Math.max(0.25, Math.min(24, editEntries[i].h + delta));
  document.getElementById(`eh${i}`).textContent = editEntries[i].h.toFixed(2);
}

// ── 出荷修正: kg/金額リアルタイム計算 ─────────────────────────
function recalcEditSale() {
  const unitPrice = parseFloat(document.getElementById('es_price')?.value || 0) || 0;
  let totalKg = 0, totalAmt = 0;
  SALE_ROWS.forEach((_, i) => {
    const qty  = parseInt(document.getElementById(`es_q${i}`)?.value || 0) || 0;
    const gram = parseInt(document.getElementById(`es_g${i}`)?.value || 100) || 0;
    const kg   = qty * gram / 1000;
    const amt  = unitPrice > 0 && gram > 0 ? qty * gram / 100 * unitPrice : 0;
    totalKg += kg; totalAmt += amt;
    const calcEl = document.getElementById(`es_calc${i}`);
    if (calcEl) calcEl.textContent = gram > 0
      ? `→ ${kg.toFixed(2)}kg${unitPrice > 0 ? ' / ¥'+Math.round(amt).toLocaleString() : ''}`
      : '';
  });
  const tot = document.getElementById('es_total');
  if (tot) tot.textContent = `合計: ${totalKg.toFixed(2)}kg` +
    (unitPrice > 0 ? ` / ¥${Math.round(totalAmt).toLocaleString()}` : '');
}

// ── 防除修正: 圃場合計リアルタイム計算 ───────────────────────
function recalcEditPestTotal() {
  let totalVol = 0, totalArea = 0;
  fieldMaster.forEach((f, i) => {
    const v = parseFloat(document.getElementById(`ep_v${i}`)?.value || 0) || 0;
    if (v > 0) { totalVol += v; totalArea += (f.area || 0); }
  });
  const bar = document.getElementById('ep_total');
  if (bar) bar.textContent =
    `合計: 散布量 ${totalVol > 0 ? totalVol.toFixed(0) : '—'} L　/　面積 ${totalArea > 0 ? totalArea.toFixed(2) : '—'} a`;
}

function onEditPestSelect() {
  const cd   = document.getElementById('ep_cd')?.value;
  const pest = pesticideMaster.find(p => p.cd === cd);
  const info = document.getElementById('ep_info');
  const text = document.getElementById('ep_info_text');
  if (pest && info && text) {
    text.innerHTML =
      `<b>${pest.name}</b>（IRAC: ${pest.irac||'—'}）<br>` +
      `対象: ${pest.target||'—'}　希釈: ${pest.dilution||'—'}　使用時期: ${pest.timing||'—'}<br>` +
      `使用上限: <b>${pest.limit!==null ? pest.limit+'回' : '—'}</b>`;
    info.style.display = 'block';
  }
}

async function submitEdit() {
  const logType = document.getElementById('editType').value;
  let payload = { type: 'edit', log_type: logType, input_method: 'LIFF', user_id: currentUserId };

  if (logType === 'work') {
    payload.date         = document.getElementById('ew_date').value;
    payload.weather      = document.getElementById('ew_weather').value;
    payload.temperature  = parseFloat(document.getElementById('ew_temp').value) || 15;
    payload.wind_speed   = parseFloat(document.getElementById('ew_wind').value) || 3;
    payload.body_feeling = document.getElementById('ew_feel').value;
    payload.work_entries = editEntries.map((e, i) => ({
      worker: document.getElementById(`ee_w${i}`)?.value || WORKERS[e.w],
      field:  document.getElementById(`ee_f${i}`)?.value || FIELDS[e.f],
      crop:   document.getElementById(`ee_c${i}`)?.value || CROPS[e.c],
      work:   document.querySelector(`.ee_k${i}`)?.value || e.k,
      hours:  e.h,
    }));

  } else if (logType === 'sale') {
    payload.date  = document.getElementById('es_date').value;
    payload.memo  = document.getElementById('es_memo').value;
    payload.unit_price_per_100g = parseFloat(document.getElementById('es_price').value) || 0;
    payload.sales = SALE_ROWS.map((dest, i) => {
      const qty  = parseInt(document.getElementById(`es_q${i}`)?.value || 0) || 0;
      const unit = document.getElementById(`es_u${i}`)?.value || '袋';
      const gram = parseInt(document.getElementById(`es_g${i}`)?.value || 100) || 100;
      const kg   = qty * gram / 1000;
      return { dest, qty, unit, gram_per_unit: gram, kg };
    }).filter(r => r.qty > 0);

  } else if (logType === 'pest') {
    const cd   = document.getElementById('ep_cd').value;
    const pest = pesticideMaster.find(p => p.cd === cd) || {};
    payload.date           = document.getElementById('ep_date').value;
    payload.pesticide_cd   = cd;
    payload.pesticide_name = pest.name || cd;
    payload.kubun          = pest.kubun || '';
    payload.dilution       = pest.dilution || '';
    payload.weather        = document.getElementById('ep_weather').value;
    payload.temperature    = parseFloat(document.getElementById('ep_temp').value) || 20;
    payload.worker_id      = document.getElementById('ep_worker').value;
    payload.memo           = document.getElementById('ep_memo').value;
    payload.fields         = fieldMaster.map((f, i) => {
      const v = parseFloat(document.getElementById(`ep_v${i}`)?.value || 0) || 0;
      return { cd: f.cd, name: f.name, area_a: f.area || 0, volume_l: v };
    }).filter(f => f.volume_l > 0);
    if (payload.fields.length === 0) { showToast('⚠️ 散布量を入力してください'); return; }
  }

  await sendToGAS(payload, '✏️ 修正を送信しました');
}

async function submitPest() {
  const cd      = document.getElementById('pestCd').value;
  const pest    = pesticideMaster.find(p => p.cd === cd) || {};
  const workerEl= document.getElementById('pestWorker');

  // 圃場別散布量を収集
  const fields = fieldMaster
    .map((f, i) => {
      const v = parseFloat(document.getElementById(`pv${i}`)?.value || 0) || 0;
      return { cd: f.cd, name: f.name, area_a: f.area || 0, volume_l: v };
    })
    .filter(f => f.volume_l > 0);

  if (fields.length === 0) { showToast('⚠️ 少なくとも1圃場の散布量を入力してください'); return; }

  const payload = {
    type:           'pesticide',
    input_method:   'LIFF',
    date:           document.getElementById('pestDate').value,
    pesticide_cd:   cd,
    pesticide_name: pest.name || cd,
    kubun:          pest.kubun   || '',
    dilution:       pest.dilution || '',
    weather:        document.getElementById('pestWeather').value,
    temperature:    pestTempVal,
    worker_id:      workerEl.value || '',
    fields,          // 圃場別配列（縦持ちで記録）
    memo:           document.getElementById('pestMemo').value,
    user_id:        currentUserId,
  };

  const totalVol  = fields.reduce((s, f) => s + f.volume_l, 0);
  const totalArea = fields.reduce((s, f) => s + (f.area_a || 0), 0);
  const ok = await sendToGAS(
    payload,
    `🌿 防除実績を登録しました（${fields.length}圃場 / 合計${totalVol}L / ${totalArea.toFixed(1)}a）`
  );
  if (ok) {
    // 入力リセット
    fieldMaster.forEach((_, i) => {
      const el = document.getElementById(`pv${i}`);
      if (el) el.value = '';
    });
    recalcPestTotal();
    document.getElementById('pestMemo').value = '';
    document.getElementById('pestCountBanner').style.display = 'none';
    updatePestCountBanner();
  }
}

// ============================================================
// JSONP取得（GAS GETのCORSを回避）
// ============================================================
function fetchGASGet(params) {
  return new Promise((resolve, reject) => {
    const cbName = 'gasCallback_' + Date.now();
    const qs = Object.entries(params).map(([k,v]) => `${k}=${encodeURIComponent(v)}`).join('&');
    const url = `${GAS_URL}?${qs}&callback=${cbName}`;
    const script = document.createElement('script');
    const timer = setTimeout(() => {
      cleanup();
      reject(new Error('JSONP timeout'));
    }, 10000);
    window[cbName] = (data) => {
      cleanup();
      resolve(data);
    };
    function cleanup() {
      clearTimeout(timer);
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
    }
    script.onerror = () => { cleanup(); reject(new Error('JSONP error')); };
    script.src = url;
    document.head.appendChild(script);
  });
}

const GAS_URL = 'https://script.google.com/macros/s/AKfycbyLnQf7vvGLap73aKKiNH8MV6Rf82OxiZVYf02Po8V1cl98Yd-HhGU2t5Kb132pUQ3f/exec';

async function sendToGAS(payload, successMsg) {
  showToast('⏳ 送信中...');
  try {
    await fetch(GAS_URL, {
      method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(payload),
    });
    showToast(successMsg);
    return true;
  } catch(err) {
    showToast('❌ 送信エラー: ' + err.message);
    return false;
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
